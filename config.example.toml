# MAA_remote 配置模板 —— 复制为 config.toml 后按本机实测值填写。
# 换机必改：[maa] 各路径、[emulator] 路径/端口。用 SPEC.md §0 的方法重扫。
# DeepSeek key 不写这里，设为环境变量 DEEPSEEK_API_KEY。
# ⚠️ 含空格的可执行文件路径必须用双引号包住（launch_cmd/shutdown_cmd 会被 shlex.split 切分）。

[lark]
allowed_sender_open_id = ""      # 留空=自动锁定当机 lark-cli 登录者；解析不到会启动报错，此时在此显式填 open_id
app_id                 = ""      # 留空=用 lark-cli 当前应用；多应用时填 appId
identity               = "auto"
event_key              = "im.message.receive_v1"

[llm]
provider            = "deepseek"
model               = "deepseek-v4-flash"  # deepseek-chat/reasoner 2026-07-24 官方下线，勿再使用
base_url            = "https://api.deepseek.com"
api_key_env         = "DEEPSEEK_API_KEY"
request_timeout_s   = 120                  # thinking 模式更慢，30s 不够
max_retries         = 1
cache_system_prompt = true
thinking            = "enabled"            # enabled | disabled(JSON 输出异常时的降级开关)
reasoning_effort    = "high"               # high | max(仅 thinking=enabled 时生效)

[maa]
maa_cli_path        = "%LOCALAPPDATA%/Programs/maa-cli/maa.exe"   # maa.exe 路径
core_dir            = "<MAA GUI 目录，含 MaaCore.dll>"             # 执行时注入 MAA_CORE_DIR
resource_dir        = "<MAA GUI 目录>/resource"
config_dir          = "%APPDATA%/loong/maa/config"                # maa-cli 配置目录；任务文件写到 <config_dir>/tasks
asst_log_path       = ""                                           # 进度信号备选源：MaaCore asst.log 完整路径；留空=直接解析 maa-cli 输出
stage_activity_json = "%LOCALAPPDATA%/loong/maa/cache/StageActivityV2.json"
client              = "Official"                                  # 区服：Official/Bilibili/YoStarEN/...
hot_update_before_catalog = true
task_timeout_s      = 3600                                        # 单次 maa run 的最长时间（秒）
daily_tasks         = ["startup", "recruit", "infrast", "mall", "award", "fight"]

[maa.fight]
stage             = ""
expiring_medicine = true
medicine          = 0
stone             = 0
series            = 0   # 0=MAA 自动选择当前理智可用的最大代理倍率；1~6=固定倍率；-1=禁用切换

[emulator]
kind           = "mumu"                       # mumu/leidian/bluestacks
vmindex        = 0
launch_cmd     = '"<模拟器管理器完整路径>" control -v 0 launch'    # 路径含空格必须带双引号
shutdown_cmd   = '"<模拟器管理器完整路径>" control -v 0 shutdown'
adb_path       = '<模拟器目录>/adb.exe'
adb_serial     = "127.0.0.1:16384"            # MuMu12 实例0 默认；查 vm_config.json 的 port_forward.adb
boot_timeout_s = 120
close_after    = false

[runtime]
busy_reply      = "正在跑中，稍等 🐢"
ack_reply       = "🚀 已开始，过程进度看本条消息的话题"  # style=flat 时建议改成"🚀 已开始，进度会陆续发出"
selection_ttl_s = 300              # 待选关卡 / 待确认状态过期时间（秒）
max_msg_age_s   = 300              # 忽略距今超过此秒数的旧消息（防积压事件轰炸）
log_file        = "logs/maa_remote.log"

[progress]
enable = true       # 执行中是否往飞书推进度
style = "thread"    # thread=进度发在开始消息的话题里 | flat=直接分条回复（话题体验不好时的回退）

[confirm]
mode = "always"     # always=每次先预告等确认 | spend_only=只有碎石/囤药计划才确认
ttl_s = 600         # 预告确认的有效期（秒），过期作废
